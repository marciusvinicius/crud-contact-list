<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="api-base" content="${API_BASE}" />
    <title>My Contacts</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Contacts</h2>
          <button id="add-contact-btn" class="btn btn-primary">+</button>
        </div>
        <div class="sidebar-search">
          <input
            id="search-input"
            type="text"
            placeholder="Search by name or email"
          />
        </div>
        <ul id="contacts-list" class="contacts-list"></ul>
        <div class="sidebar-footer">
          <button
            id="delete-selected-btn"
            class="btn btn-danger btn-small hidden"
          >
            Delete selected
          </button>
        </div>
      </aside>

      <main class="main-content">
        <section id="welcome-panel" class="welcome-panel hidden">
          <div class="welcome-panel-content">
            <h1>Welcome to Contacts</h1>
            <p>
              Use the list on the left to browse your contacts, and the form
              here to view and edit details.
            </p>
            <p>
              You can add emails, search by name or email, and select multiple
              contacts with Shift, Ctrl+A, or Shift+Click for quick bulk
              actions.
            </p>
            <button id="welcome-dismiss-btn" class="btn btn-primary">
              Got it
            </button>
          </div>
        </section>
        <section class="contact-form">
          <div id="status-message" class="status-message hidden"></div>
          <div class="name-row">
            <div class="field-group">
              <label for="first-name">First name</label>
              <input id="first-name" type="text" />
            </div>
            <div class="field-group">
              <label for="last-name">Last name</label>
              <input id="last-name" type="text" />
            </div>
          </div>

          <div class="emails-section">
            <div class="emails-header">
              <h3>Emails</h3>
            </div>
            <ul id="emails-list" class="emails-list"></ul>
            <button id="add-email-btn" class="btn btn-secondary">+ Add email</button>
          </div>

          <div class="actions">
            <div class="actions-left">
            <button id="delete-contact-btn" class="btn btn-danger">Delete</button>
            </div>
            <div class="actions-right">
            <button id="save-contact-btn" class="btn btn-primary">Save</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="main.js"></script>
  </body>
  </html>
