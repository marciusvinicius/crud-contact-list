services:
  backend:
    build:
      context: . 
      dockerfile: backend/Dockerfile
    container_name: contacts-app
    ports:
      - 8000:8000
    environment:
      - API_BASE=http://backend:8000
    networks:
      - contacts-network
    volumes:
      - ./backend/contacts.db:/app/backend/contacts.db
      - ./backend/:/app/backend/
  front:
    build:
      context: .
      dockerfile: front/Dockerfile
    container_name: contacts-front
    ports:
      - 80:80
    networks:
      - contacts-network
    environment:
      - API_BASE=http://backend:8000
    volumes:
      - ./front/nginx.conf:/etc/nginx/nginx.conf
      - ./front/:/usr/share/nginx/html
    depends_on:
      - backend
  
networks:
  contacts-network:
    driver: bridge